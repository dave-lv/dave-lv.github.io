<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>aionjanis - Voice Commands</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }

		body {
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
			background: #0e0e10;
			color: #efeff1;
			min-height: 100vh;
			padding: 2rem;
		}

		.container {
			max-width: 900px;
			margin: 0 auto;
		}

		header {
			text-align: center;
			margin-bottom: 2rem;
		}

		h1 {
			font-size: 2rem;
			font-weight: 700;
			margin-bottom: 0.5rem;
		}

		.subtitle {
			color: #adadb8;
			font-size: 1rem;
		}

		.count {
			color: #bf94ff;
			font-weight: 600;
		}

		.search {
			display: block;
			width: 100%;
			max-width: 400px;
			margin: 1.5rem auto;
			padding: 0.6rem 1rem;
			background: #1f1f23;
			border: 1px solid #303032;
			border-radius: 6px;
			color: #efeff1;
			font-size: 1rem;
			outline: none;
		}

		.search:focus {
			border-color: #bf94ff;
		}

		.commands {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
			gap: 0.6rem;
			margin-top: 1.5rem;
		}

		.command {
			background: #1f1f23;
			border: 1px solid #303032;
			border-radius: 6px;
			padding: 0.6rem 1rem;
			font-family: 'Consolas', 'Courier New', monospace;
			font-size: 0.95rem;
			text-align: center;
			transition: border-color 0.15s, background 0.15s;
			cursor: pointer;
			user-select: none;
		}

		.command:hover {
			border-color: #bf94ff;
			background: #26262c;
		}

		.command.copied {
			border-color: #00c853;
			background: #1b3a1b;
		}

		.command.hidden {
			display: none;
		}

		footer {
			text-align: center;
			margin-top: 3rem;
			color: #53535f;
			font-size: 0.85rem;
		}
	</style>
</head>
<body>
	<div class="container">
		<header>
			<h1>aionjanis Voice Commands</h1>
			<p class="subtitle">Click to copy, then paste in chat! <span class="count">1</span> commands available.</p>
		</header>

		<input type="text" class="search" placeholder="Search commands..." id="search">

		<div class="commands" id="commands">
				<button class="command" onclick="copy(this)">!pukachu</button>
		</div>

		<footer>
			Updated 2026-03-15 15:18:05 UTC
		</footer>
	</div>

	<script>
		document.getElementById('search').addEventListener('input', function() {
			const q = this.value.toLowerCase();
			document.querySelectorAll('.command').forEach(el => {
				el.classList.toggle('hidden', !el.textContent.toLowerCase().includes(q));
			});
		});

		function copy(btn) {
			navigator.clipboard.writeText(btn.textContent).then(() => {
				btn.classList.add('copied');
				setTimeout(() => btn.classList.remove('copied'), 600);
			});
		}
	</script>
</body>
</html>
